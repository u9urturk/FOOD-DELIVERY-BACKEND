# Render.com Infrastructure as Code
# This file defines the services for automatic deployment

services:
  # PostgreSQL Database
  - type: pserv
    name: food-delivery-postgres
    env: production
    plan: starter
    databaseName: food_delivery
    user: postgres
    
  # Redis Instance  
  - type: redis
    name: food-delivery-redis
    env: production
    plan: starter
    maxmemoryPolicy: allkeys-lru
    
  # Backend Web Service
  - type: web
    name: food-delivery-backend
    env: production
    plan: starter
    runtime: docker
    buildCommand: ""
    startCommand: ""
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: APP_NAME
        value: Food Delivery Backend
      - key: APP_VERSION
        value: 1.0.0
      - key: DATABASE_URL
        fromService:
          type: pserv
          name: food-delivery-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: food-delivery-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
        length: 64
      - key: JWT_REFRESH_SECRET
        generateValue: true  
        length: 64
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGINS
        value: https://yourdomain.com,https://www.yourdomain.com
      - key: THROTTLE_TTL
        value: 60000
      - key: THROTTLE_LIMIT
        value: 1000
      - key: THROTTLE_AUTH_LIMIT
        value: 50
      - key: LOG_LEVEL
        value: info
      - key: DEBUG_SQL
        value: false
      - key: BCRYPT_ROUNDS
        value: 12
      - key: SEED_DATABASE
        value: true
      - key: OTP_WINDOW
        value: 1
      - key: OTP_STEP
        value: 30
      - key: OTP_DIGITS
        value: 6
      - key: SWAGGER_ENABLED
        value: false
